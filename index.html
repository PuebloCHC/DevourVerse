<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>DevourVerse 3D</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="gameWrap">
    <canvas id="gameCanvas"></canvas>

    <div id="hud">
      <div class="hud-card">
        <div>Size: <span id="sizeValue">1.00</span></div>
        <div>Total Score: <span id="scoreValue">0</span></div>
        <div>Dimension: <span id="dimensionValue">1</span></div>
        <div>Stage: <span id="stageValue">Micro</span></div>
      </div>
      <div id="milestone">Eat dust and germs to begin.</div>
      <div id="errorBanner" hidden></div>
    </div>

    <div id="joystick" aria-hidden="true">
      <div id="joystickBase"></div>
      <div id="joystickKnob"></div>
    </div>
  </div>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
